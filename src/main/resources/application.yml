spring:
  application:
    name: dhl-backend
  autoconfigure:
    exclude:
      # We define two realm-specific chains + decoders ourselves; Boot's single-decoder chain must not auto-build.
      - org.springframework.boot.security.oauth2.server.resource.autoconfigure.web.reactive.ReactiveOAuth2ResourceServerWebSecurityAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:12432/dhl}
    username: ${DB_USER:dhl}
    password: ${DB_PASSWORD:dhl}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:12092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: dhl-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

server:
  port: ${PORT:12080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:false}
  swagger-ui:
    enabled: ${OPENAPI_ENABLED:false}

dhl:
  backend:
    enabled: ${DHL_BACKEND_ENABLED:true}
  security:
    courier-issuer: ${KEYCLOAK_ISSUER_COURIER:http://localhost:12081/realms/courier}
    locker-issuer: ${KEYCLOAK_ISSUER_LOCKER:http://localhost:12081/realms/locker}
    courier-jwks: ${KEYCLOAK_JWKS_COURIER:}
    locker-jwks: ${KEYCLOAK_JWKS_LOCKER:}
  locker-sim:
    base-url: ${LOCKER_SIM_BASE_URL:http://localhost:12080}
    serve: ${LOCKER_SIM_SERVE:true}
  locker-client:
    token-uri: ${LOCKER_TOKEN_URI:http://localhost:12081/realms/locker/protocol/openid-connect/token}
    client-id: ${LOCKER_CLIENT_ID:dhl-backend}
    client-secret: ${LOCKER_CLIENT_SECRET:}
  sim-passthrough:
    enabled: ${SIM_ENABLED:true}
  reaper:
    enabled: ${REAPER_ENABLED:true}
    timeout: ${REAPER_TIMEOUT:5m}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://dhl-courier.vanharen-it.nl,https://dhl-locker.vanharen-it.nl}
