apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: dhl-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.4
          args: ["start", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dhl-secrets
                  key: keycloak-admin-password
            - name: KC_HOSTNAME
              value: https://dhl-auth.vanharen-it.nl
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: realms
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: realms
          configMap:
            name: keycloak-realms
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: dhl-demo
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: dhl-demo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts: [dhl-auth.vanharen-it.nl]
      secretName: keycloak-tls
  rules:
    - host: dhl-auth.vanharen-it.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
