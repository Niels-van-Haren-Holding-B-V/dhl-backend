apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: dhl-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      # The realm JSONs in git contain ${...} placeholders instead of secrets;
      # this init step renders them before Keycloak imports them (Keycloak
      # itself does no env substitution on import).
      initContainers:
        - name: render-realms
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              for f in /in/*.json; do
              sed -e "s|\${DEMO_USER_PASSWORD}|$DEMO_USER_PASSWORD|g"
              -e "s|\${LOCKER_CLIENT_SECRET}|$LOCKER_CLIENT_SECRET|g"
              "$f" > /out/$(basename "$f"); done
          env:
            - name: DEMO_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dhl-secrets
                  key: demo-user-password
            - name: LOCKER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dhl-secrets
                  key: locker-client-secret
          volumeMounts:
            - name: realms
              mountPath: /in
              readOnly: true
            - name: realms-rendered
              mountPath: /out
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.4
          args: ["start", "--import-realm"]
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: admin
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dhl-secrets
                  key: keycloak-admin-password
            - name: KC_HOSTNAME
              value: https://dhl-auth.vanharen-it.nl
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: realms-rendered
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 1Gi
      volumes:
        - name: realms
          configMap:
            name: keycloak-realms
        - name: realms-rendered
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: dhl-demo
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: dhl-demo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
spec:
  tls:
    - hosts: [dhl-auth.vanharen-it.nl]
      secretName: keycloak-tls
  rules:
    - host: dhl-auth.vanharen-it.nl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
