apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - cluster-issuer.yaml
  - postgres.yaml
  - redpanda.yaml
  - keycloak.yaml
  - backend.yaml
  - locker-sim-svc.yaml

configMapGenerator:
  - name: keycloak-realms
    namespace: dhl-demo
    files:
      - ../keycloak/realm-courier.json
      - ../keycloak/realm-locker.json
generatorOptions:
  disableNameSuffixHash: true

# NOT included here on purpose:
#   - seed-job.yaml      (run by hand between demo runs)
# Required once, by hand (never committed):
#   kubectl -n dhl-demo create secret docker-registry ghcr \
#     --docker-server=ghcr.io --docker-username=<github-user> --docker-password=<ghcr-pat>
#   kubectl -n dhl-demo create secret generic dhl-secrets \
#     --from-literal=db-password=... \
#     --from-literal=keycloak-admin-password=... \
#     --from-literal=locker-client-secret=... (see infra/.env / apply-secrets.sh)
