# Local dev stack — host ports deliberately in the 12xxx range to avoid
# conflicts: postgres :12432, keycloak :12081, redpanda :12092, backend :12080.
#
# Two ways to run:
#   deps only (backend via ./gradlew bootRun on :12080):
#     docker compose -f infra/docker-compose.yml up -d
#   full stack incl. the backend container:
#     docker compose -f infra/docker-compose.yml --profile full up -d --build
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dhl
      POSTGRES_USER: dhl
      POSTGRES_PASSWORD: dhl
    ports:
      - "12432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    command: ["start-dev", "--http-port=8081", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      # Fixed issuer so browser tokens and in-network validation agree.
      KC_HOSTNAME: http://localhost:12081
    ports:
      - "12081:8081"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  redpanda:
    image: redpandadata/redpanda:v24.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      # two listeners: host clients on :12092, compose-network clients on :29092
      - --kafka-addr=external://0.0.0.0:9092,internal://0.0.0.0:29092
      - --advertise-kafka-addr=external://localhost:12092,internal://redpanda:29092
    ports:
      - "12092:9092"

  backend:
    profiles: [full]
    build: ..
    ports:
      - "12080:8080"
    depends_on:
      - postgres
      - keycloak
      - redpanda
    environment:
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/dhl
      DB_USER: dhl
      DB_PASSWORD: dhl
      KAFKA_BOOTSTRAP: redpanda:29092
      # issuer = what the browser sees; jwks/token = in-network endpoints
      KEYCLOAK_ISSUER_COURIER: http://localhost:12081/realms/courier
      KEYCLOAK_ISSUER_LOCKER: http://localhost:12081/realms/locker
      KEYCLOAK_JWKS_COURIER: http://keycloak:8081/realms/courier/protocol/openid-connect/certs
      KEYCLOAK_JWKS_LOCKER: http://keycloak:8081/realms/locker/protocol/openid-connect/certs
      LOCKER_TOKEN_URI: http://keycloak:8081/realms/locker/protocol/openid-connect/token
      # one container serves BFF + sim and talks to itself, like bootRun
      LOCKER_SIM_BASE_URL: http://localhost:8080

volumes:
  pgdata:
