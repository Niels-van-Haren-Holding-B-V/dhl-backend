name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --console=plain

      - name: Resolve lowercase image name
        if: github.ref == 'refs/heads/main'
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/dhl-backend" >> "$GITHUB_ENV"

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    concurrency: k3s-deploy   # one deploy at a time
    steps:
      - uses: actions/checkout@v4

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifests
        # realm JSONs live outside infra/k8s, hence the load restrictor
        run: kubectl kustomize --load-restrictor LoadRestrictionsNone infra/k8s | kubectl apply -f -

      - name: Roll deployments to the freshly pushed :latest
        run: |
          kubectl -n dhl-demo rollout restart deploy/dhl-backend deploy/locker-sim
          kubectl -n dhl-demo rollout status deploy/dhl-backend --timeout=240s
          kubectl -n dhl-demo rollout status deploy/locker-sim --timeout=240s

      - name: Smoke check
        # retries bridge the endpoint-propagation window right after a rollout
        run: |
          curl -sf --retry 6 --retry-delay 5 --retry-all-errors https://dhl-api.vanharen-it.nl/actuator/health
          curl -sf --retry 6 --retry-delay 5 --retry-all-errors https://dhl-auth.vanharen-it.nl/realms/courier/.well-known/openid-configuration >/dev/null
